<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beyond the Screen: K-Culture Analysis</title>
    <style>
        :root {
            --primary-bg: #0d0d0d;
            --accent-color: #ff2e63;
            --sub-accent: #ae2dff;
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            background-color: var(--primary-bg); 
            color: var(--text-main); 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            line-height: 1.8;
        }

        /* 내비게이션 바 */
        nav {
            position: fixed; top: 0; width: 100%; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; background: rgba(13, 13, 13, 0.9);
            backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid #333;
        }
        .nav-logo { font-weight: 900; font-size: 1.2rem; background: linear-gradient(to right, var(--accent-color), var(--sub-accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-menu a { color: var(--text-dim); text-decoration: none; margin-left: 20px; font-size: 0.85rem; font-weight: 600; }

        /* 표지 (Hero Section) - 크고 두꺼운 글씨 + 화려한 배경 */
        .hero {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; background: radial-gradient(circle at 50% 50%, #2a0a4a 0%, #0d0d0d 100%);
            padding: 0 10%;
        }
        .hero h1 { 
            font-size: clamp(3.5rem, 10vw, 6.5rem); font-weight: 900; line-height: 1.1; margin-bottom: 25px;
            letter-spacing: -2px; background: linear-gradient(to bottom, #fff, #ddd); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .hero .subtitle { font-size: clamp(1.1rem, 2.5vw, 1.8rem); color: var(--text-dim); font-weight: 500; margin-bottom: 50px; }
        .hero .info { font-size: 0.95rem; color: #666; font-weight: 700; border-top: 1px solid #333; padding-top: 20px; }

        /* 섹션 디자인 */
        section { padding: 120px 10%; max-width: 1400px; margin: 0 auto; }
        .section-num { color: var(--accent-color); font-weight: 900; font-size: 1.2rem; margin-bottom: 10px; display: block; }
