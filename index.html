<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beyond the Screen | K-Cinema Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505; /* 아주 깊은 검은색 */
            --cinema-red: #8B0000; /* 어두운 커튼 레드 */
            --screen-glow: rgba(255, 255, 255, 0.05); /* 스크린 은은한 빛 */
            --text-gray: #bbb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg-dark); 
            color: #fff; 
            font-family: 'Noto Sans KR', sans-serif; 
            line-height: 1.8;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* 내비게이션 바 - 영화 표지 느낌 */
        nav {
            position: fixed; top: 0; width: 100%; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 50px; background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(5px); z-index: 1000; border-bottom: 2px solid var(--cinema-red);
        }
        .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 1px; color: var(--cinema-red); }
        .nav-menu a { 
            color: var(--text-gray); text-decoration: none; margin-left: 25px; 
            font-size: 0.85rem; transition: 0.3s; font-weight: 500;
        }
        .nav-menu a:hover { color: #fff; text-shadow: 0 0 10px #fff; }

        /* 표지 (Hero Section) - 웅장한 영화관 스크린 */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background: 
                linear-gradient(to bottom, rgba(5,5,5,0.8), rgba(5,5,5,1)),
                radial-gradient(circle at center, rgba(255,255,255,0.1) 0%, rgba(5,5,5,1) 70%);
            padding: 0 20px;
            position: relative;
        }
        
        /* 영화관 커튼 느낌의 배경 효과 */
        .hero::before, .hero::after {
            content: ''; position: absolute; top: 0; width: 10vw; height: 100%;
            background: linear-gradient(to right, #1a0000, #050505);
            opacity: 0.5;
        }
        .hero::before { left: 0; }
        .hero::after { right: 0; transform: scaleX(-1); }

        .hero-tag { 
            font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: var(--cinema-red); 
            letter-spacing: 2px; margin-bottom: 15px;
        }
        .hero h1 { 
            font-size: clamp(2.5rem, 6vw, 5rem); font-weight: 700; margin-bottom: 25px;
            line-height: 1.1; text-shadow: 0 0 20px rgba(255,255,255,0.5);
            font-family: 'Noto Sans KR', sans-serif;
        }
        .hero p { color: #888; margin-bottom: 40px; max-width: 650px; font-weight: 300; }
        
        /* 영화 티켓 느낌의 버튼 */
        .hero-btn {
            padding: 18px 50px; background-color: var(--cinema-red);
            border: 2px solid #fff; color: #fff; font-weight: bold;
            cursor: pointer; transition: 0.3s; text-decoration: none;
            font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(139, 0, 0, 0.5);
        }
        .hero-btn:hover { background-color: #fff; color: var(--cinema-red); box-shadow: 0 0 25px #fff; }

        /* 섹션 공통 스타일 - 스크린의 빛 */
        section { 
            padding: 120px 15vw; 
            border-bottom: 1px solid #1a1a1a;
            position: relative;
        }
        section::before {
            content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 80%; height: 1px; background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
        }

        h2 { 
            font-size: 2.2rem; margin-bottom: 50px; color: #fff; text-align: center;
            font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
